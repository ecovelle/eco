<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Переходим на Wildberries…</title>

<!-- ============================================================
     НАСТРОЙКИ — здесь можно менять товар и счётчик Метрики
     ============================================================ -->
<script>
  // 1) Ссылка на ТВОЙ товар на Wildberries (можно поменять на любой другой)
  var WB_URL = "https://www.wildberries.ru/catalog/271132665/detail.aspx";

  // 2) Номер счётчика Яндекс.Метрики.
  //    Пока стоит 0 — счётчик выключен. Впиши сюда свой номер (например 98765432),
  //    и статистика кликов начнёт собираться. Как получить — смотри инструкцию.
  var METRIKA_ID = 0;
</script>
<!-- ============================================================ -->

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(160deg, #481173 0%, #7b2ff7 55%, #cb11ab 100%);
    color: #fff;
  }
  .wrap {
    min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 24px;
  }
  .logo {
    font-size: 22px; font-weight: 800; letter-spacing: 0.5px;
    margin-bottom: 26px; opacity: 0.95;
  }
  .spinner {
    width: 54px; height: 54px; margin: 0 auto 26px;
    border: 4px solid rgba(255,255,255,0.28);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 20px; font-weight: 700; margin: 0 0 10px; }
  p  { font-size: 15px; line-height: 1.5; opacity: 0.9; margin: 0 0 26px; max-width: 340px; }
  .btn {
    display: inline-block; text-decoration: none;
    background: #fff; color: #7b2ff7;
    font-size: 16px; font-weight: 700;
    padding: 15px 30px; border-radius: 14px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    transition: transform 0.1s ease;
  }
  .btn:active { transform: scale(0.97); }
  .hint { margin-top: 22px; font-size: 12.5px; opacity: 0.75; max-width: 320px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Wildberries</div>
    <div class="spinner"></div>
    <h1>Открываем товар…</h1>
    <p>Секунду — переносим тебя в приложение Wildberries.</p>
    <a class="btn" id="manualBtn" href="#">Открыть товар вручную</a>
    <div class="hint" id="hint">Если ничего не открылось — нажми кнопку выше.</div>
  </div>

<script>
(function () {
  var ua = navigator.userAgent || navigator.vendor || "";
  var isAndroid = /android/i.test(ua);
  var isIOS = /iphone|ipad|ipod/i.test(ua) || (/Macintosh/i.test(ua) && 'ontouchend' in document);

  // Достаём путь после домена, чтобы собрать intent-ссылку для Android
  var path = WB_URL.replace(/^https?:\/\//, ""); // www.wildberries.ru/catalog/.../detail.aspx

  // Android: intent:// заставляет открыть именно приложение Wildberries,
  // а не встроенный браузер Instagram. Если приложения нет — откроется сайт.
  var androidIntent =
    "intent://" + path +
    "#Intent;scheme=https;package=com.wildberries.ru;" +
    "S.browser_fallback_url=" + encodeURIComponent(WB_URL) + ";end";

  // Куда ведёт кнопка «открыть вручную»
  var manualTarget = isAndroid ? androidIntent : WB_URL;
  document.getElementById("manualBtn").setAttribute("href", manualTarget);

  // --- Яндекс.Метрика (счётчик кликов). Работает, только если вписан METRIKA_ID ---
  function initMetrika() {
    if (!METRIKA_ID) return;
    (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
    m[i].l=1*new Date();k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})
    (window, document, "script", "https://mc.yandex.ru/metrika/tag.js", "ym");
    ym(METRIKA_ID, "init", { clickmap:true, trackLinks:true, accurateTrackBounce:true });
    try { ym(METRIKA_ID, "reachGoal", "wb_click"); } catch(e){}
  }

  function go() {
    if (isAndroid) {
      window.location.href = androidIntent;
    } else if (isIOS) {
      // iOS: обычная https-ссылка открывает приложение (universal link), если оно установлено
      window.location.href = WB_URL;
    } else {
      window.location.href = WB_URL;
    }
  }

  initMetrika();
  // Небольшая задержка, чтобы счётчик успел записать клик, затем редирект
  setTimeout(go, 500);
})();
</script>
</body>
</html>
